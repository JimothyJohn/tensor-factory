name: CI

# The local gate is ./Quickstart -c; this runs the same steps in CI so a green PR locally is
# a green PR here. Pull requests and pushes to master both run it.
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --locked --all-packages

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check

      - name: Unit tests
        run: uv run --all-packages python -m pytest -m unit
