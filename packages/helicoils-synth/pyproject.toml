[project]
name = "helicoils-synth"
version = "0.1.0"
description = "Synthetic helicoil image generation (Nano Banana / Gemini) and auto-labeling (GroundingDINO)"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "helicoils",
    "pillow>=10",
]

[project.optional-dependencies]
# Generation backend: hosted Gemini API (Nano Banana). Light, no GPU. Pull with
# `uv sync --extra gemini`; needs a GEMINI_API_KEY in the environment.
gemini = [
    "google-genai>=1",
]
# Auto-labeler (GroundingDINO) only. Heavy, GPU-shaped; NOT installed by default
# `uv sync`. Pull with `uv sync --extra gpu` on a CUDA box or this Mac Studio's MPS.
gpu = [
    "torch>=2.2",
    "transformers>=4.44",
    "accelerate>=0.30",
]

[project.scripts]
helicoils-synth = "helicoils_synth.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helicoils_synth"]

[tool.uv.sources]
helicoils = { workspace = true }
