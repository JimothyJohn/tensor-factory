[project]
name = "helicoils-label"
version = "0.1.0"
description = "Label Studio integration: push auto-label candidates, pull corrected labels back to COCO"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "helicoils",
    "httpx>=0.27",
]

[project.scripts]
helicoils-label = "helicoils_label.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helicoils_label"]

[tool.uv.sources]
helicoils = { workspace = true }
