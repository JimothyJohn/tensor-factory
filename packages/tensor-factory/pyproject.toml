[project]
name = "tensor-factory"
version = "0.1.0"
description = "Open, lightweight tiny-CNN object detection: geometry, 8-bit codec, and annotation formats"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = []

[project.optional-dependencies]
# CPU inference runtime. Pure-Python core stays dependency-free; pull this on the
# edge device with `uv pip install 'tensor-factory[infer]'`.
infer = [
    "onnxruntime>=1.17",
    "numpy>=1.24",
    "pillow>=10",
]

[project.scripts]
tensor-factory = "tensor_factory.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tensor_factory"]
