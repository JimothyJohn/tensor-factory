[project]
name = "helicoils-synth"
version = "0.1.0"
description = "Synthetic helicoil image generation (FLUX.1-schnell) and auto-labeling (GroundingDINO)"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "helicoils",
    "pillow>=10",
]

[project.optional-dependencies]
# Heavy, GPU-shaped deps. NOT installed by default `uv sync`; pull with
# `uv sync --extra gpu` on a CUDA box or this Mac Studio's MPS backend.
gpu = [
    "torch>=2.2",
    "diffusers>=0.30",
    "transformers>=4.44",
    "accelerate>=0.30",
    "sentencepiece>=0.2",
    "protobuf>=4",
]

[project.scripts]
helicoils-synth = "helicoils_synth.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helicoils_synth"]

[tool.uv.sources]
helicoils = { workspace = true }
