[project]
name = "tensor-factory-train"
version = "0.1.0"
description = "Train a tiny tensor-factory detector and export an int8 ONNX model"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "tensor-factory",
    "numpy>=1.24",
    "pillow>=10",
    "onnxruntime>=1.17",
]

[project.optional-dependencies]
# torch is the only heavy bit. Pull for a training run with
# `uv pip install torch` (or sync this extra) on a CUDA box or this Mac's MPS.
train = [
    "torch>=2.2",
]

[project.scripts]
tensor-factory-train = "tensor_factory_train.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tensor_factory_train"]

[tool.uv.sources]
tensor-factory = { workspace = true }
