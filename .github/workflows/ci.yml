name: CI

# Mirrors the local gate (./Quickstart -c) so green-locally == green-in-CI:
# ruff lint + format, ty types, pytest unit, AND the Studio JS unit tests.
# Runs on PRs and on pushes to the long-lived branches (dev integration +
# master release); this `gate` job is the single required status check that
# branch protection on `dev` and Dependabot auto-merge gate on.
on:
  push:
    branches: [master, dev]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Node (Studio JS tests)
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Sync (locked)
        run: uv sync --locked --all-packages

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check

      - name: Unit tests (Python)
        run: uv run --all-packages python -m pytest -m unit

      - name: Unit tests (Studio JS)
        run: node --test studio/tests/*.test.mjs
