[project]
name = "helicoils"
version = "0.1.0"
description = "Open, lightweight helicoil detection: geometry, 8-bit codec, and annotation formats"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helicoils"]
