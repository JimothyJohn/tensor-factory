[project]
name = "tensor-factory-studio"
version = "0.1.0"
description = "Local backend for Tensor Factory Studio: serves the labeling UI and runs continuous training"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "tensor-factory",
    "tensor-factory-train",
    "pillow>=10",
]

[project.optional-dependencies]
# Training is the heavy bit -- pulls torch (and onnxruntime for export/serve).
# `uv sync --extra serve` on this Mac's MPS or a CUDA box to run the server.
serve = [
    "torch>=2.2",
    "onnxruntime>=1.17",
]

[project.scripts]
tensor-factory-studio = "tensor_factory_studio.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tensor_factory_studio"]

[tool.uv.sources]
tensor-factory = { workspace = true }
tensor-factory-train = { workspace = true }
